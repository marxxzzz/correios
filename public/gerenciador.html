<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RastroFácil — Gerenciador de Envios</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#F1F5F9;color:#111827;min-height:100vh;display:flex;flex-direction:column}
button{font-family:inherit;cursor:pointer}

/* Header */
.site-header{background:#1C3A6B;color:#fff;box-shadow:0 2px 10px rgba(0,0,0,.3)}
.header-inner{max-width:1200px;margin:0 auto;padding:0 1.5rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.site-logo{display:flex;align-items:center;gap:.6rem;user-select:none}
.logo-wordmark{display:flex;flex-direction:column;line-height:1;gap:1px}
.logo-name{font-size:1.25rem;font-weight:900;font-style:italic}
.logo-name span{color:#F57C00}
.logo-sub{font-size:.55rem;font-weight:700;letter-spacing:.2em;color:#93C5FD;text-transform:uppercase}
.header-actions{display:flex;align-items:center;gap:.75rem}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.35);color:#CBD5E1;padding:.4rem .9rem;border-radius:6px;font-size:.8rem;transition:all .15s}
.btn-logout:hover{background:rgba(255,255,255,.1);color:#fff}

/* Login overlay */
#login-overlay{position:fixed;inset:0;background:#F1F5F9;display:flex;align-items:center;justify-content:center;z-index:999}
.login-card{background:#fff;border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:2.5rem;width:100%;max-width:360px;text-align:center}
.login-card h2{font-size:1.1rem;font-weight:700;color:#1C3A6B;margin-bottom:.4rem}
.login-card p{font-size:.85rem;color:#6B7280;margin-bottom:1.5rem}
.login-card input{width:100%;padding:.75rem 1rem;border:2px solid #E2E8F0;border-radius:8px;font-size:1rem;font-family:inherit;outline:none;letter-spacing:.1em;text-align:center;transition:border-color .2s;margin-bottom:.75rem}
.login-card input:focus{border-color:#F57C00}
.login-card .btn-login{width:100%;padding:.75rem;background:#F57C00;color:#fff;border:none;border-radius:8px;font-size:.95rem;font-weight:700;transition:background .15s}
.login-card .btn-login:hover{background:#E05600}
.login-err{color:#DC2626;font-size:.82rem;margin-top:.5rem;min-height:1.2em}

/* Main */
.main{flex:1;padding:1.75rem 1.5rem 3rem;max-width:1200px;margin:0 auto;width:100%}

/* Topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.5rem}
.page-title{font-size:1.1rem;font-weight:700;color:#1C3A6B}
.topbar-right{display:flex;gap:.6rem;align-items:center}
.stat-chip{background:#fff;border-radius:8px;padding:.4rem .9rem;font-size:.8rem;font-weight:700;color:#6B7280;box-shadow:0 1px 3px rgba(0,0,0,.07)}
.btn-refresh{background:#1C3A6B;color:#fff;border:none;border-radius:8px;padding:.45rem 1rem;font-size:.82rem;font-weight:600;display:flex;align-items:center;gap:.4rem;transition:background .15s}
.btn-refresh:hover{background:#254d8f}
.btn-refresh svg{width:15px;height:15px}
.btn-refresh.loading svg{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Table card */
.table-card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.07),0 4px 18px rgba(0,0,0,.05);overflow:hidden}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.875rem}
thead{background:#F8FAFC;border-bottom:2px solid #E2E8F0}
th{padding:.85rem 1rem;text-align:left;font-size:.68rem;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.08em;white-space:nowrap}
td{padding:.85rem 1rem;border-bottom:1px solid #F1F5F9;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.code-mono{font-family:'Courier New',monospace;font-size:.82rem;font-weight:700;color:#1C3A6B;letter-spacing:.05em}
.cpf-val{font-family:'Courier New',monospace;font-size:.82rem;color:#374151;letter-spacing:.04em}
.city-val{color:#374151;font-size:.85rem}
.date-val{font-size:.8rem;color:#6B7280;white-space:nowrap}

/* Status badges */
.badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border-radius:999px;font-size:.75rem;font-weight:700;white-space:nowrap}
.badge svg{width:12px;height:12px;flex-shrink:0}
.b-green{background:#DCFCE7;color:#15803D}
.b-orange{background:#FFF3E0;color:#C45000}
.b-blue{background:#DBEAFE;color:#1D4ED8}
.b-gray{background:#F1F5F9;color:#475569}

/* Empty / loading */
.table-msg{text-align:center;padding:3rem 1rem;color:#94A3B8;font-size:.9rem}

/* Footer */
.site-footer{background:#1C3A6B;color:#93C5FD;text-align:center;padding:1rem;font-size:.78rem;margin-top:auto}
.site-footer strong{color:#fff}
</style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay">
  <div class="login-card">
    <h2>Acesso restrito</h2>
    <p>Informe a senha para acessar o gerenciador</p>
    <input id="senha-input" type="password" placeholder="••••••••••" autocomplete="current-password">
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <p class="login-err" id="login-err"></p>
  </div>
</div>

<header class="site-header">
  <div class="header-inner">
    <div class="site-logo">
      <svg width="36" height="24" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <rect x="0" y="9" width="10" height="2.5" rx="1.25" fill="#7EB8F7" opacity=".8"/>
        <rect x="12" y="6" width="19" height="15" rx="2" fill="white" opacity=".9"/>
        <rect x="29" y="10" width="12" height="11" rx="2" fill="#7EB8F7"/>
        <rect x="31" y="11.5" width="8" height="6.5" rx="1.5" fill="#BFDBFE" opacity=".85"/>
        <circle cx="18" cy="24" r="4.2" fill="#BDD6F5"/><circle cx="18" cy="24" r="1.9" fill="#EFF6FF"/>
        <circle cx="36" cy="24" r="4.2" fill="#BDD6F5"/><circle cx="36" cy="24" r="1.9" fill="#EFF6FF"/>
        <path d="M40 23 Q44 18 46 8" stroke="#F57C00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M43 0 C40 0 37.5 2.5 37.5 5.5 C37.5 10.5 43 18 43 18 C43 18 48.5 10.5 48.5 5.5 C48.5 2.5 46 0 43 0Z" fill="#F57C00"/>
        <circle cx="43" cy="5.5" r="3" fill="white"/>
      </svg>
      <div class="logo-wordmark">
        <span class="logo-name">Rastro<span>Fácil</span></span>
        <span class="logo-sub">Gerenciador de Envios</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-logout" onclick="sair()">Sair</button>
    </div>
  </div>
</header>

<main class="main">
  <div class="topbar">
    <h1 class="page-title">Envios cadastrados</h1>
    <div class="topbar-right">
      <span class="stat-chip" id="stat-total">—</span>
      <button class="btn-refresh" id="btn-refresh" onclick="carregarEnvios()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
        Atualizar
      </button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>CPF</th>
            <th>Código</th>
            <th>Serviço</th>
            <th>Origem</th>
            <th>Destino</th>
            <th>Status</th>
            <th>Última atualização</th>
          </tr>
        </thead>
        <tbody id="tabela-body">
          <tr><td colspan="7" class="table-msg">Carregando…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<footer class="site-footer">
  <strong>RastroFácil</strong> &mdash; Logística Inteligente &bull; &copy; 2026
</footer>

<script>
var _senha = null;

var BADGE = {
  ENTREGUE:     { cls: 'b-green',  label: 'Entregue',          icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>' },
  SAIU_ENTREGA: { cls: 'b-orange', label: 'Saiu p/ entrega',   icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4z"/></svg>' },
  TRANSFERENCIA:{ cls: 'b-blue',   label: 'Em trânsito',       icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 17.01V10h-2v7.01h-3L15 21l4-3.99h-3zM9 3 5 6.99h3V14h2V6.99h3L9 3z"/></svg>' },
  POSTADO:      { cls: 'b-blue',   label: 'Postado',           icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>' },
  ETIQUETA:     { cls: 'b-gray',   label: 'Etiqueta emitida',  icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.63 5.84C17.27 5.33 16.67 5 16 5L5 5.01C3.9 5.01 3 5.9 3 7v10c0 1.1.9 1.99 2 1.99L16 19c.67 0 1.27-.33 1.63-.84L22 12z"/></svg>' },
};

function renderBadge(tipo) {
  var b = BADGE[tipo] || { cls: 'b-gray', label: tipo, icon: '' };
  return '<span class="badge ' + b.cls + '">' + b.icon + b.label + '</span>';
}

function formatarCpf(cpf) {
  if (!cpf) return '—';
  var c = cpf.replace(/\D/g,'');
  return c.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
}

function fazerLogin() {
  var s = document.getElementById('senha-input').value;
  if (!s) return;
  _senha = s;
  carregarEnvios();
}

document.getElementById('senha-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') fazerLogin();
});

function sair() {
  _senha = null;
  document.getElementById('login-overlay').style.display = 'flex';
  document.getElementById('senha-input').value = '';
  document.getElementById('login-err').textContent = '';
  document.getElementById('tabela-body').innerHTML = '<tr><td colspan="7" class="table-msg">Carregando…</td></tr>';
  document.getElementById('stat-total').textContent = '—';
}

async function carregarEnvios() {
  if (!_senha) return;
  var btn = document.getElementById('btn-refresh');
  btn.classList.add('loading');

  try {
    var r = await fetch('/api/admin/envios', {
      headers: { 'Authorization': 'Basic ' + btoa('admin:' + _senha) }
    });

    if (r.status === 401) {
      document.getElementById('login-err').textContent = 'Senha incorreta.';
      _senha = null;
      btn.classList.remove('loading');
      return;
    }

    // Login OK → esconde overlay
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('login-err').textContent = '';

    var d = await r.json();
    if (!r.ok) throw new Error(d.erro || 'Erro ao carregar');

    document.getElementById('stat-total').textContent = d.total + ' envio' + (d.total !== 1 ? 's' : '');
    renderTabela(d.envios || []);
  } catch (e) {
    document.getElementById('tabela-body').innerHTML =
      '<tr><td colspan="7" class="table-msg">Erro: ' + e.message + '</td></tr>';
  }

  btn.classList.remove('loading');
}

function renderTabela(envios) {
  var tbody = document.getElementById('tabela-body');
  if (!envios.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="table-msg">Nenhum envio cadastrado.</td></tr>';
    return;
  }
  tbody.innerHTML = envios.map(function(e) {
    return '<tr>' +
      '<td><span class="cpf-val">' + formatarCpf(e.cpf) + '</span></td>' +
      '<td><span class="code-mono">' + e.codigo + '</span></td>' +
      '<td>' + (e.servico || '—') + '</td>' +
      '<td class="city-val">' + (e.origem  || '—') + '</td>' +
      '<td class="city-val">' + (e.destino || '—') + '</td>' +
      '<td>' + renderBadge(e.status) + '</td>' +
      '<td class="date-val">' + (e.dataStatus || '—') + '</td>' +
    '</tr>';
  }).join('');
}

// Verifica se há senha salva na sessão
(function() {
  var s = sessionStorage.getItem('rf_admin');
  if (s) { _senha = s; carregarEnvios(); }
})();

// Salva senha na sessão após login bem-sucedido (opcional)
var _origCarregar = carregarEnvios;
carregarEnvios = async function() {
  await _origCarregar();
  if (_senha && document.getElementById('login-overlay').style.display === 'none') {
    sessionStorage.setItem('rf_admin', _senha);
  }
};
</script>
</body>
</html>
