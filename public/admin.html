<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>RastroFácil — Gerar Rastreio</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#F1F5F9;min-height:100vh;display:flex;flex-direction:column}
  header{background:#1C3A6B;color:#fff;padding:.85rem 1.25rem;display:flex;align-items:center;gap:.6rem}
  .logo-name{font-size:1.15rem;font-weight:900;font-style:italic}
  .logo-name span{color:#F57C00}
  .logo-sub{font-size:.6rem;font-weight:700;letter-spacing:.18em;color:#93C5FD;text-transform:uppercase;margin-top:1px}
  main{flex:1;display:flex;justify-content:center;padding:2rem 1rem}
  .card{background:#fff;border-radius:14px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 18px rgba(0,0,0,.05);padding:2rem;width:100%;max-width:480px;height:fit-content}
  h1{font-size:1.05rem;font-weight:700;color:#1C3A6B;margin-bottom:1.5rem;display:flex;align-items:center;gap:.5rem}
  .field{margin-bottom:1rem}
  label{display:block;font-size:.72rem;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.35rem}
  input,select{width:100%;padding:.7rem .9rem;border:2px solid #E2E8F0;border-radius:8px;font-size:.95rem;font-family:inherit;color:#111827;outline:none;transition:border-color .2s;background:#F8FAFC}
  input:focus,select:focus{border-color:#F57C00;background:#fff}
  input[type=password]{letter-spacing:.1em}
  .btn{width:100%;padding:.8rem;background:#F57C00;color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-top:.5rem;transition:background .15s}
  .btn:hover{background:#E05600}
  .erro{color:#DC2626;font-size:.85rem;margin-top:.75rem;font-weight:500}
  #resultado{margin-top:1.5rem;display:none;border-top:2px solid #F1F5F9;padding-top:1.5rem}
  .resultado-label{font-size:.68rem;font-weight:700;color:#94A3B8;text-transform:uppercase;letter-spacing:.1em;margin-bottom:.3rem}
  .cpf-val{font-size:1.2rem;font-weight:700;color:#1C3A6B;margin-bottom:1rem}
  .codigo-val{font-family:'Courier New',monospace;font-size:.85rem;color:#6B7280;margin-bottom:1rem;background:#F8FAFC;padding:.5rem .75rem;border-radius:6px;border:1px solid #E2E8F0}
  .link-box{background:#FFF3E0;border:1px solid #FDBA74;border-radius:8px;padding:.75rem 1rem;margin-bottom:.75rem;word-break:break-all;font-size:.82rem;color:#C45000}
  .link-box a{color:#C45000;font-weight:600}
  .copy-btn{width:100%;padding:.65rem;background:#1C3A6B;color:#fff;border:none;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;transition:background .15s}
  .copy-btn:hover{background:#254d8f}
  footer{background:#1C3A6B;color:#93C5FD;text-align:center;padding:1rem;font-size:.78rem}
  footer strong{color:#fff}
</style>
</head>
<body>

<header>
  <svg width="36" height="24" viewBox="0 0 48 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <rect x="0" y="9" width="10" height="2.5" rx="1.25" fill="#7EB8F7" opacity=".8"/>
    <rect x="12" y="6" width="19" height="15" rx="2" fill="white" opacity=".9"/>
    <rect x="29" y="10" width="12" height="11" rx="2" fill="#7EB8F7"/>
    <rect x="31" y="11.5" width="8" height="6.5" rx="1.5" fill="#BFDBFE" opacity=".85"/>
    <circle cx="18" cy="24" r="4.2" fill="#BDD6F5"/>
    <circle cx="36" cy="24" r="4.2" fill="#BDD6F5"/>
    <path d="M40 23 Q44 18 46 8" stroke="#F57C00" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <path d="M43 0 C40 0 37.5 2.5 37.5 5.5 C37.5 10.5 43 18 43 18 C43 18 48.5 10.5 48.5 5.5 C48.5 2.5 46 0 43 0Z" fill="#F57C00"/>
    <circle cx="43" cy="5.5" r="3" fill="white"/>
  </svg>
  <div>
    <div class="logo-name">Rastro<span>Fácil</span></div>
    <div class="logo-sub">Painel Administrativo</div>
  </div>
</header>

<main>
  <div class="card">
    <h1>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="#F57C00"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 13 12 13s-3.5-1.57-3.5-3.5S10.07 6 12 6zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V19z"/></svg>
      Gerar código de rastreio
    </h1>

    <div class="field">
      <label>CPF do destinatário</label>
      <input id="cpf" type="text" inputmode="numeric" maxlength="14" placeholder="000.000.000-00" autocomplete="off">
    </div>

    <div class="field">
      <label>Serviço</label>
      <select id="servico">
        <option value="SEDEX">SEDEX</option>
        <option value="PAC">PAC</option>
        <option value="SEDEX10">SEDEX 10</option>
        <option value="SEDEX12">SEDEX 12</option>
      </select>
    </div>

    <div class="field">
      <label>Cidade de origem</label>
      <input id="origem" type="text" placeholder="Ex: SAO PAULO - SP" value="SAO PAULO - SP">
    </div>

    <div class="field">
      <label>Cidade de destino</label>
      <input id="destino" type="text" placeholder="Ex: BELO HORIZONTE - MG">
    </div>

    <div class="field">
      <label>Prazo de entrega (dias úteis)</label>
      <input id="dias" type="number" min="1" max="30" value="7">
    </div>

    <div class="field">
      <label>Senha de acesso</label>
      <input id="senha" type="password" placeholder="Senha de admin">
    </div>

    <button class="btn" onclick="gerar()">Gerar código</button>
    <div class="erro" id="erro"></div>

    <div id="resultado">
      <p class="resultado-label">CPF vinculado</p>
      <p class="cpf-val" id="cpf-gerado"></p>

      <p class="resultado-label">Código interno de rastreio</p>
      <p class="codigo-val" id="codigo-gerado"></p>

      <p class="resultado-label">Link para o cliente</p>
      <div class="link-box"><a id="link-rastreio" target="_blank"></a></div>
      <button class="copy-btn" onclick="copiar()">Copiar link para o cliente</button>
    </div>
  </div>
</main>

<footer><strong>RastroFácil</strong> &mdash; Logística Inteligente &bull; &copy; 2026</footer>

<script>
function mascaraCpf(v) {
  v = v.replace(/\D/g, '').slice(0, 11);
  if (v.length > 9) return v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
  if (v.length > 6) return v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
  if (v.length > 3) return v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
  return v;
}

var cpfInput = document.getElementById('cpf');
cpfInput.addEventListener('input', function() {
  var sel  = this.selectionStart;
  var prev = this.value.length;
  this.value = mascaraCpf(this.value);
  var diff = this.value.length - prev;
  this.setSelectionRange(sel + diff, sel + diff);
});

async function gerar() {
  document.getElementById('erro').textContent = '';
  document.getElementById('resultado').style.display = 'none';

  var cpfRaw   = cpfInput.value.replace(/\D/g, '');
  var senha    = document.getElementById('senha').value;
  var destino  = document.getElementById('destino').value.trim().toUpperCase();
  var origem   = document.getElementById('origem').value.trim().toUpperCase();

  if (cpfRaw.length !== 11) { document.getElementById('erro').textContent = 'Informe o CPF completo (11 dígitos).'; return; }
  if (!destino)              { document.getElementById('erro').textContent = 'Informe a cidade de destino.'; return; }
  if (!senha)                { document.getElementById('erro').textContent = 'Informe a senha de acesso.'; return; }

  try {
    var r = await fetch('/api/rastreio', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Basic ' + btoa('admin:' + senha)
      },
      body: JSON.stringify({
        cpf:     cpfRaw,
        servico: document.getElementById('servico').value,
        origem,
        destino,
        dias:    parseInt(document.getElementById('dias').value)
      })
    });
    var d = await r.json();
    if (!r.ok) throw new Error(d.erro || 'Erro desconhecido');

    var cpfFormatado = cpfRaw.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
    var url = window.location.origin + d.url;

    document.getElementById('cpf-gerado').textContent    = cpfFormatado;
    document.getElementById('codigo-gerado').textContent = d.codigo;
    var a = document.getElementById('link-rastreio');
    a.href = url;
    a.textContent = url;
    document.getElementById('resultado').style.display = 'block';
  } catch (e) {
    document.getElementById('erro').textContent = 'Erro: ' + e.message;
  }
}

function copiar() {
  var url = document.getElementById('link-rastreio').href;
  navigator.clipboard.writeText(url).then(function() {
    var btn = document.querySelector('.copy-btn');
    btn.textContent = '✓ Link copiado!';
    setTimeout(function() { btn.textContent = 'Copiar link para o cliente'; }, 2000);
  });
}
</script>
</body>
</html>
